<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Jiwon Shin profile introduction</title>
  <desc id="desc">A calm GitHub profile header with Jiwon Shin's name and a soft abstract line design.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.56" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.52" stop-color="#86efac"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="soft" cx="76%" cy="34%" r="48%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.18"/>
      <stop offset="0.52" stop-color="#86efac" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="41"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .draw { stroke-dasharray: 9 13; animation: draw 12s linear infinite; }
      @keyframes draw { to { stroke-dashoffset: -220; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="18" fill="url(#soft)"/>
  <rect width="1200" height="360" rx="18" filter="url(#grain)" opacity="0.55"/>

  <path d="M84 72H1116M84 288H1116" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M96 58V302M1104 58V302" stroke="#ffffff" stroke-opacity="0.08"/>

  <g transform="translate(104 92)">
    <text x="0" y="0" class="mono" font-size="14" font-weight="700" fill="#7dd3fc">HELLO, I'M</text>
    <text x="0" y="82" class="sans" font-size="76" font-weight="850" fill="#f8fafc">Jiwon Shin</text>
    <text x="4" y="128" class="sans" font-size="24" fill="#cbd5e1">Full-stack + AI/ML engineer</text>
    <text x="4" y="168" class="sans" font-size="19" fill="#94a3b8">I like building useful systems with clear product flow.</text>
  </g>

  <g transform="translate(696 80)">
    <path class="draw" d="M0 126 C78 36, 168 192, 260 104 S404 72, 426 152" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
    <path d="M4 184 C90 120, 168 222, 282 166 S390 130, 430 190" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2" stroke-linecap="round"/>
    <circle cx="118" cy="98" r="10" fill="#7dd3fc" opacity="0.9"/>
    <circle cx="310" cy="98" r="10" fill="#86efac" opacity="0.9"/>
    <circle cx="426" cy="152" r="8" fill="#c4b5fd" opacity="0.9"/>
    <text x="18" y="242" class="mono" font-size="13" fill="#94a3b8">ideas -> code -> product</text>
  </g>
</svg>
