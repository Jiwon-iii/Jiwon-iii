<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Lab index media art for Jiwon Shin</title>
  <desc id="desc">A dark experimental media-art panel with data lines, route arcs, and index cards for AI recommendation work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="0.52" stop-color="#15171c"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" x2="1">
      <stop offset="0" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .thin { stroke-width: 1.5; vector-effect: non-scaling-stroke; }
      .pulse { animation: pulse 3.4s ease-in-out infinite; transform-origin: center; }
      .drift { animation: drift 9s ease-in-out infinite alternate; }
      .scan { animation: scan 6s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes drift { from { transform: translateX(-14px); } to { transform: translateX(18px); } }
      @keyframes scan { from { transform: translateY(-80px); } to { transform: translateY(540px); } }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <rect width="1200" height="520" filter="url(#grain)" opacity="0.55"/>

  <path d="M0 72H1200M0 448H1200" stroke="#f8fafc" stroke-opacity="0.12"/>
  <path d="M84 0V520M1080 0V520" stroke="#f8fafc" stroke-opacity="0.12"/>
  <path class="scan" d="M84 0H1080" stroke="#67e8f9" stroke-opacity="0.42" stroke-width="2"/>

  <g transform="translate(92 78)">
    <rect x="0" y="0" width="308" height="346" fill="#f7f7f2" stroke="#f7f7f2"/>
    <rect x="14" y="14" width="280" height="318" fill="#111827" stroke="#020617" stroke-width="3"/>
    <text x="30" y="48" fill="#22c55e" class="mono" font-size="15">PROFILE_INDEX::04</text>
    <text x="30" y="100" fill="#f8fafc" class="sans" font-size="45" font-weight="800">Models</text>
    <text x="30" y="146" fill="#f8fafc" class="sans" font-size="45" font-weight="800">only matter</text>
    <text x="30" y="192" fill="#f8fafc" class="sans" font-size="45" font-weight="800">when they</text>
    <text x="30" y="238" fill="#f8fafc" class="sans" font-size="45" font-weight="800">ship.</text>
    <rect x="30" y="274" width="96" height="12" fill="#22c55e"/>
    <rect x="136" y="274" width="72" height="12" fill="#38bdf8"/>
    <rect x="218" y="274" width="36" height="12" fill="#f97316"/>
    <text x="30" y="314" fill="#94a3b8" class="mono" font-size="13">JIWON SHIN / AI PRODUCT SYSTEMS</text>
  </g>

  <g transform="translate(452 88)">
    <text x="0" y="0" fill="#94a3b8" class="mono" font-size="13">LIVE SIGNAL MAP</text>
    <text x="0" y="40" fill="#f8fafc" class="sans" font-size="31" font-weight="750">ranking logic -> product surface</text>
    <path d="M18 190 C140 62, 250 300, 390 150 S620 120, 696 255" fill="none" stroke="url(#green)" stroke-width="6" stroke-linecap="round" opacity="0.88"/>
    <path class="drift" d="M4 244 C132 132, 250 360, 410 205 S610 177, 722 306" fill="none" stroke="url(#warm)" stroke-width="3" stroke-linecap="round" opacity="0.78"/>
    <g class="pulse">
      <circle cx="18" cy="190" r="11" fill="#22c55e"/>
      <circle cx="390" cy="150" r="11" fill="#67e8f9"/>
      <circle cx="696" cy="255" r="11" fill="#f97316"/>
    </g>
    <g fill="none" stroke="#f8fafc" stroke-opacity="0.17">
      <circle cx="164" cy="182" r="92"/>
      <circle cx="466" cy="198" r="124"/>
      <circle cx="650" cy="112" r="58"/>
    </g>
    <g class="mono" font-size="13">
      <text x="32" y="214" fill="#bbf7d0">nearby</text>
      <text x="408" y="144" fill="#cffafe">rank</text>
      <text x="664" y="260" fill="#fed7aa">route</text>
    </g>
  </g>

  <g transform="translate(452 370)" class="mono" font-size="13">
    <g>
      <rect width="172" height="62" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.13"/>
      <text x="16" y="24" fill="#94a3b8">FOCUS</text>
      <text x="16" y="46" fill="#f8fafc">recommendation</text>
    </g>
    <g transform="translate(192 0)">
      <rect width="172" height="62" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.13"/>
      <text x="16" y="24" fill="#94a3b8">MODEL</text>
      <text x="16" y="46" fill="#f8fafc">learning-to-rank</text>
    </g>
    <g transform="translate(384 0)">
      <rect width="172" height="62" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.13"/>
      <text x="16" y="24" fill="#94a3b8">STACK</text>
      <text x="16" y="46" fill="#f8fafc">full-stack</text>
    </g>
    <g transform="translate(576 0)">
      <rect width="172" height="62" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.13"/>
      <text x="16" y="24" fill="#94a3b8">FIELD</text>
      <text x="16" y="46" fill="#f8fafc">local-commerce AI</text>
    </g>
  </g>

  <g transform="translate(1016 98)" class="mono">
    <rect x="0" y="0" width="104" height="268" fill="#f7f7f2"/>
    <text transform="translate(34 240) rotate(-90)" fill="#111827" font-size="18" font-weight="800">LAB INDEX</text>
    <path d="M22 28H82M22 58H82M22 88H82" stroke="#111827" stroke-width="4"/>
    <rect x="24" y="118" width="56" height="56" fill="#22c55e"/>
    <rect x="34" y="128" width="36" height="36" fill="#111827"/>
  </g>
</svg>
