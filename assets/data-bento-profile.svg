<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Data bento profile banner for Jiwon Shin</title>
  <desc id="desc">A structured bento-style profile banner centered on Jiwon Shin and a concise full-stack AI/ML identity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0f"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#48f5a6"/>
      <stop offset="1" stop-color="#fb4f7a"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151a23"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.92 0 0 0 0 0.78 0 0 0 0.38 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="31"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .dash { stroke-dasharray: 7 11; animation: move 11s linear infinite; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: center; }
      @keyframes move { to { stroke-dashoffset: -180; } }
      @keyframes pulse { 0%,100% { opacity: .48; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="460" fill="url(#bg)"/>
  <rect width="1200" height="460" fill="url(#grid)"/>
  <rect width="1200" height="460" filter="url(#grain)" opacity="0.6"/>

  <path d="M78 58H1122V402H78Z" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <g transform="translate(112 86)">
    <rect x="0" y="0" width="628" height="286" rx="10" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M0 72H628" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M42 0V286M586 0V286" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="36" y="42" fill="#67e8f9" class="mono" font-size="14" font-weight="700">PROFILE / BUILDER MODE</text>
    <text x="36" y="130" fill="#f8fafc" class="sans" font-size="74" font-weight="850">Jiwon Shin</text>
    <text x="40" y="178" fill="#cbd5e1" class="sans" font-size="24">Full-stack + AI/ML engineer</text>
    <text x="40" y="218" fill="#94a3b8" class="sans" font-size="18">I like building useful systems with clean product flow.</text>
    <rect x="40" y="244" width="86" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="62" y="263" fill="#dbeafe" class="mono" font-size="12" font-weight="700">builder</text>
    <rect x="138" y="244" width="92" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="158" y="263" fill="#dcfce7" class="mono" font-size="12" font-weight="700">systems</text>
    <rect x="242" y="244" width="90" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="263" y="263" fill="#fce7f3" class="mono" font-size="12" font-weight="700">product</text>
  </g>

  <g transform="translate(772 86)">
    <rect x="0" y="0" width="316" height="132" rx="10" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="22" y="36" fill="#94a3b8" class="mono" font-size="13">currently into</text>
    <text x="22" y="78" fill="#f8fafc" class="sans" font-size="32" font-weight="760">useful systems</text>
    <path class="dash" d="M22 104 C88 72, 152 128, 216 96 S284 76, 294 104" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(772 238)">
    <rect x="0" y="0" width="148" height="134" rx="10" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="20" y="34" fill="#94a3b8" class="mono" font-size="12">work across</text>
    <text x="20" y="76" fill="#67e8f9" class="sans" font-size="30" font-weight="800">front</text>
    <text x="20" y="108" fill="#f8fafc" class="sans" font-size="30" font-weight="800">back</text>
  </g>

  <g transform="translate(940 238)">
    <rect x="0" y="0" width="148" height="134" rx="10" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle class="pulse" cx="42" cy="48" r="12" fill="#48f5a6" filter="url(#glow)"/>
    <circle class="pulse" cx="86" cy="70" r="8" fill="#67e8f9"/>
    <circle class="pulse" cx="112" cy="46" r="6" fill="#fb4f7a"/>
    <text x="20" y="104" fill="#f8fafc" class="sans" font-size="28" font-weight="800">AI/ML</text>
  </g>

  <g transform="translate(112 392)" class="mono" font-size="13" fill="#cbd5e1">
    <text x="0" y="0">ideas -> interfaces -> APIs -> model behavior -> useful product details</text>
  </g>
</svg>
