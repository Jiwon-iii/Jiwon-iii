<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Neo ticket profile banner for Jiwon Shin</title>
  <desc id="desc">An editorial ticket-style GitHub profile banner for a full-stack and AI/ML engineer.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf6"/>
      <stop offset="0.58" stop-color="#faf4e6"/>
      <stop offset="1" stop-color="#efe5cf"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171c"/>
      <stop offset="1" stop-color="#080a0f"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#48f5a6"/>
      <stop offset="0.55" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#fb4f7a"/>
    </linearGradient>
    <pattern id="fineGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#15171c" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .flow { stroke-dasharray: 12 13; animation: flow 12s linear infinite; }
      .blink { animation: blink 2.8s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset: -260; } }
      @keyframes blink { 0%,100% { opacity: .42; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#080a0f"/>
  <rect x="0" y="0" width="1200" height="520" fill="url(#fineGrid)" opacity="0.5"/>
  <path d="M0 78H1200M0 442H1200" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M78 0V520M1122 0V520" stroke="#ffffff" stroke-opacity="0.08"/>

  <g filter="url(#softShadow)">
    <path d="M96 86H1104V434H96V86Z" fill="url(#paper)"/>
    <path d="M96 86H1104V434H96V86Z" fill="url(#fineGrid)" opacity="0.78"/>
    <path d="M96 86H1104V434H96V86Z" filter="url(#grain)" opacity="0.18"/>
    <path d="M96 86H1104V434H96V86Z" fill="none" stroke="#15171c" stroke-width="3"/>
    <path d="M758 86V434" stroke="#15171c" stroke-width="3" stroke-dasharray="8 12"/>
    <circle cx="758" cy="86" r="22" fill="#080a0f"/>
    <circle cx="758" cy="434" r="22" fill="#080a0f"/>
  </g>

  <g transform="translate(132 122)">
    <text x="0" y="0" fill="#15171c" class="mono" font-size="14" font-weight="700">PROFILE PASS / 2026</text>
    <text x="0" y="58" fill="#15171c" class="sans" font-size="58" font-weight="850">Jiwon Shin</text>
    <text x="0" y="112" fill="#15171c" class="sans" font-size="44" font-weight="780">builds product layers</text>
    <text x="0" y="158" fill="#15171c" class="sans" font-size="44" font-weight="780">around model behavior.</text>
    <text x="0" y="207" fill="#4b5563" class="sans" font-size="20">Full-stack + AI/ML engineer working on recommendation,</text>
    <text x="0" y="236" fill="#4b5563" class="sans" font-size="20">ranking APIs, GPS-aware routes, and clean user flows.</text>

    <g transform="translate(0 274)" class="mono" font-size="13" font-weight="700">
      <rect x="0" y="-20" width="112" height="32" fill="#15171c"/>
      <text x="16" y="1" fill="#fffdf4">AI/ML</text>
      <rect x="124" y="-20" width="130" height="32" fill="#48f5a6"/>
      <text x="140" y="1" fill="#15171c">FULL-STACK</text>
      <rect x="266" y="-20" width="128" height="32" fill="#67e8f9"/>
      <text x="282" y="1" fill="#15171c">RANKING</text>
      <rect x="406" y="-20" width="108" height="32" fill="#fb4f7a"/>
      <text x="422" y="1" fill="#15171c">ROUTES</text>
    </g>
  </g>

  <g transform="translate(800 120)">
    <text x="0" y="0" fill="#15171c" class="mono" font-size="13" font-weight="800">BOARDING DATA</text>
    <g class="mono" font-size="14">
      <g transform="translate(0 34)">
        <rect width="248" height="38" fill="#15171c"/>
        <text x="16" y="24" fill="#fffdf4">NOW</text>
        <text x="86" y="24" fill="#48f5a6">AI recommendation</text>
      </g>
      <g transform="translate(0 84)">
        <rect width="248" height="38" fill="none" stroke="#15171c" stroke-width="2"/>
        <text x="16" y="24" fill="#15171c">MODEL</text>
        <text x="86" y="24" fill="#15171c">learning-to-rank</text>
      </g>
      <g transform="translate(0 134)">
        <rect width="248" height="38" fill="none" stroke="#15171c" stroke-width="2"/>
        <text x="16" y="24" fill="#15171c">STACK</text>
        <text x="86" y="24" fill="#15171c">Next.js / FastAPI</text>
      </g>
      <g transform="translate(0 184)">
        <rect width="248" height="38" fill="none" stroke="#15171c" stroke-width="2"/>
        <text x="16" y="24" fill="#15171c">FIELD</text>
        <text x="86" y="24" fill="#15171c">local-commerce AI</text>
      </g>
    </g>

    <path class="flow" d="M4 280 C66 222, 136 322, 244 252" fill="none" stroke="url(#signal)" stroke-width="5" stroke-linecap="round"/>
    <circle class="blink" cx="4" cy="280" r="8" fill="#48f5a6"/>
    <circle class="blink" cx="132" cy="282" r="8" fill="#67e8f9"/>
    <circle class="blink" cx="244" cy="252" r="8" fill="#fb4f7a"/>
  </g>

  <g transform="translate(1062 104)" class="mono">
    <text transform="rotate(90)" x="0" y="0" fill="#15171c" font-size="15" font-weight="900">MODELS - SYSTEMS - PRODUCTS</text>
  </g>
</svg>
