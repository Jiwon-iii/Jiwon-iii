<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Jiwon Shin editorial profile header</title>
  <desc id="desc">A bright editorial-style profile header for Jiwon Shin.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.6" stop-color="#fbf6ea"/>
      <stop offset="1" stop-color="#f1eadc"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="paperGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#111827" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="67"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="22" fill="#0d1117"/>
  <rect x="76" y="44" width="1048" height="272" rx="16" fill="url(#paper)"/>
  <rect x="76" y="44" width="1048" height="272" rx="16" fill="url(#paperGrid)"/>
  <rect x="76" y="44" width="1048" height="272" rx="16" filter="url(#grain)" opacity="0.14"/>
  <rect x="76" y="44" width="1048" height="272" rx="16" fill="none" stroke="#111827" stroke-opacity="0.85" stroke-width="2"/>

  <rect x="104" y="84" width="120" height="192" rx="10" fill="url(#dark)"/>
  <text x="145" y="180" transform="rotate(-90 145 180)" class="mono" font-size="14" font-weight="800" fill="#f8fafc">PROFILE</text>
  <circle cx="164" cy="124" r="22" fill="#7dd3fc"/>
  <circle cx="164" cy="178" r="22" fill="#86efac"/>
  <circle cx="164" cy="232" r="22" fill="#c4b5fd"/>

  <g transform="translate(260 86)">
    <text x="0" y="0" class="mono" font-size="14" font-weight="800" fill="#2563eb">FULL-STACK + AI/ML ENGINEER</text>
    <text x="0" y="88" class="sans" font-size="78" font-weight="900" fill="#111827">Jiwon Shin</text>
    <text x="2" y="136" class="sans" font-size="24" fill="#374151">Freelance project experience from planning to operation.</text>
    <path d="M0 172H536" stroke="#111827" stroke-opacity="0.72" stroke-width="2"/>
    <g transform="translate(0 208)" class="mono" font-size="13" font-weight="800">
      <text x="0" y="0" fill="#111827">PLAN</text>
      <text x="84" y="0" fill="#111827">BUILD</text>
      <text x="176" y="0" fill="#111827">OPERATE</text>
      <text x="292" y="0" fill="#4b5563">usable products with clean flow</text>
    </g>
  </g>

  <g transform="translate(920 84)">
    <rect x="0" y="0" width="150" height="192" rx="10" fill="#111827"/>
    <text x="24" y="44" class="mono" font-size="13" font-weight="800" fill="#86efac">CURRENT</text>
    <text x="24" y="86" class="sans" font-size="30" font-weight="850" fill="#f8fafc">Useful</text>
    <text x="24" y="120" class="sans" font-size="30" font-weight="850" fill="#f8fafc">systems</text>
    <rect x="24" y="146" width="34" height="10" fill="#7dd3fc"/>
    <rect x="66" y="146" width="34" height="10" fill="#86efac"/>
    <rect x="108" y="146" width="18" height="10" fill="#c4b5fd"/>
  </g>
</svg>
